name: Daily Technical Log & Commit Streak

on:
  schedule:
    - cron: '0 5 * * *' # Runs daily at 5:00 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  commit-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing commits back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Logging Script
        run: python daily_log.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add logs/
          git add README.md
          
          # Only commit and push if there are changes
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: auto-log daily study pattern [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
